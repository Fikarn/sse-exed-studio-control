[workspace]
resolver = "2"
members = ["protocol/rust", "rust-engine", "tauri-shell"]

[workspace.package]
edition = "2021"
rust-version = "1.80"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.39.0", features = ["bundled"] }
studio-control-protocol = { path = "protocol/rust" }
tauri = { version = "2", features = [] }
tauri-build = { version = "2", features = [] }
