name: dev-checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs of this workflow on the same ref when a new push lands
# (plan PR 1 / workstream B6 concurrency portion). Path filters are deferred
# to a later PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required merge hygiene on protected branches. Never a release gate.
# Target-host release evidence on macOS Apple Silicon and Windows 11 x64
# remains the release acceptance mechanism for this repo (see AGENTS.md).
jobs:
  format-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run scripts:test
      - run: npm run release:check
      - run: npm run file:health
      - run: npm run protocol:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run frontend:typecheck

  # plan PR 1 / workstream B1 + B2 (consolidated).
  # `frontend:playwright:test` now includes the `visual-review.spec.ts`
  # baseline diff (workstream A1), so this single job covers both the
  # `frontend-e2e` and `visual-review` jobs from the plan — sharing the
  # Vite preview server boot cost as B2 suggests.
  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/app/package.json', 'package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browser deps (chromium)
        working-directory: frontend/app
        run: npx playwright install --with-deps chromium
      - run: npm run frontend:playwright:test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/app/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload Playwright test results (visual diffs + traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/app/test-results/
          if-no-files-found: ignore
          retention-days: 14

  # plan PR 2 / workstream B3 (extends).
  # The plan says "Extends the existing `rust` job with `npm run
  # native:acceptance` after `native:test`." native:acceptance requires
  # real RME TotalMix OSC packets on 127.0.0.1; on stock GitHub runners
  # there are none, so we opt into the new
  # `SSE_NATIVE_ACCEPTANCE_SKIP_AUDIO_SYNC=1` escape that mirrors the
  # existing `audioProbeBindDenied` skip — the rest of the harness
  # (import → backup → restart → workflow parity → restore → verify
  # rollback) still runs end-to-end. See plan Follow-ups.
  rust:
    runs-on: ubuntu-latest
    env:
      SSE_NATIVE_ACCEPTANCE_SKIP_AUDIO_SYNC: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: ./.github/actions/setup-tauri-linux
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
      - run: npm ci
      - run: npm run rust:fmt:check
      - run: npm run rust:clippy
      - run: npm run native:check
      - run: npm run native:test
      - run: npm run native:acceptance

  # plan PR 2 / workstream B4.
  # `tauri:foundation` = protocol:generate + native:engine:build +
  # tauri:build + tauri:smoke. tauri:smoke is stdin/stdout only (no
  # display required), but tauri:build needs the WebKitGTK toolchain
  # from the composite action.
  tauri-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-tauri-linux
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          # Distinct cache key from the `rust` job — that one targets debug
          # `studio-control-engine` profile, this one builds the full Tauri
          # shell. Sharing the cache key would thrash the smaller scope.
          shared-key: tauri-foundation
      - run: npm ci
      - run: npm run tauri:foundation

  # plan PR 2 / workstream B5: DEFERRED.
  # The `qualification` job was scoped here but rescoped out — the
  # qualification scripts have hardcoded 40s `waitForStatus` deadlines that
  # ubuntu-latest hardware cannot meet (shared rust-cache + pre-built shell
  # got past the cargo compile cliff but the engine's first health snapshot
  # then stalls past the 40s window). Making that CI-tolerant needs an
  # env-var-driven timeout on both ~500-line qualification scripts plus
  # possible Mesa software-rendering setup for the libEGL warnings — bigger
  # than a workflow tweak. Tracked in the plan's Follow-ups; lands in a
  # focused PR ("plan PR 2b: qualification CI job") before PR 3.
