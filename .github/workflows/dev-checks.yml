name: dev-checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs of this workflow on the same ref when a new push lands
# (plan PR 1 / workstream B6 concurrency portion). Path filters are deferred
# to a later PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Required merge hygiene on protected branches. Never a release gate.
# Target-host release evidence on macOS Apple Silicon and Windows 11 x64
# remains the release acceptance mechanism for this repo (see AGENTS.md).
jobs:
  format-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run scripts:test
      - run: npm run release:check
      - run: npm run file:health
      - run: npm run protocol:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run frontend:typecheck

  # plan PR 1 / workstream B1 + B2 (consolidated).
  # `frontend:playwright:test` now includes the `visual-review.spec.ts`
  # baseline diff (workstream A1), so this single job covers both the
  # `frontend-e2e` and `visual-review` jobs from the plan — sharing the
  # Vite preview server boot cost as B2 suggests.
  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/app/package.json', 'package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browser deps (chromium)
        working-directory: frontend/app
        run: npx playwright install --with-deps chromium
      - run: npm run frontend:playwright:test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/app/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload Playwright test results (visual diffs + traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/app/test-results/
          if-no-files-found: ignore
          retention-days: 14

  # plan PR 2 / workstream B3 (extends).
  # The plan says "Extends the existing `rust` job with `npm run
  # native:acceptance` after `native:test`." native:acceptance requires
  # real RME TotalMix OSC packets on 127.0.0.1; on stock GitHub runners
  # there are none, so we opt into the new
  # `SSE_NATIVE_ACCEPTANCE_SKIP_AUDIO_SYNC=1` escape that mirrors the
  # existing `audioProbeBindDenied` skip — the rest of the harness
  # (import → backup → restart → workflow parity → restore → verify
  # rollback) still runs end-to-end. See plan Follow-ups.
  rust:
    runs-on: ubuntu-latest
    env:
      SSE_NATIVE_ACCEPTANCE_SKIP_AUDIO_SYNC: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: ./.github/actions/setup-tauri-linux
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
      - run: npm ci
      - run: npm run rust:fmt:check
      - run: npm run rust:clippy
      - run: npm run native:check
      - run: npm run native:test
      - run: npm run native:acceptance

  # plan PR 2 / workstream B4.
  # `tauri:foundation` = protocol:generate + native:engine:build +
  # tauri:build + tauri:smoke. tauri:smoke is stdin/stdout only (no
  # display required), but tauri:build needs the WebKitGTK toolchain
  # from the composite action.
  tauri-foundation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-tauri-linux
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          # Distinct cache key from the `rust` job — that one targets debug
          # `studio-control-engine` profile, this one builds the full Tauri
          # shell. Sharing the cache key would thrash the smaller scope.
          shared-key: tauri-foundation
      - run: npm ci
      - run: npm run tauri:foundation

  # plan PR 2b / workstream B5.
  # `tauri:setup-support:qualify` + `tauri:workspaces:qualify` spawn the
  # Tauri shell via `tauri dev --features test-bridge`. The shell opens a
  # WebKitGTK window, so the runner needs an X server — `xvfb-run -a`
  # gives each command its own auto-allocated display. Both qualifications
  # bind 127.0.0.1:4173 (Vite preview) with --strictPort, so they run
  # serially within this job and on a separate runner from `frontend-e2e`
  # (which also binds 4173) per the plan's preferred isolation.
  #
  # PR 2b additions (vs the iteration deferred in PR 2):
  # - `SSE_TAURI_QUALIFICATION_TIMEOUT_MS`: extends the qualification
  #   scripts' default `waitForStatus` deadline (40s) — far too tight for
  #   the engine's first health snapshot on ubuntu-latest's xvfb software
  #   rendering, which takes ~30-90s on cold runs.
  # - `LIBGL_ALWAYS_SOFTWARE`: forces Mesa software rasterization so the
  #   WebKitGTK shell skips the `DRI3 device` probe (which fails on
  #   xvfb-only runners with a misleading 30s-ish hang during init).
  qualification:
    runs-on: ubuntu-latest
    # `tauri-foundation` builds the full Tauri shell crate from cold cache.
    # We reuse its `rust-cache` via the same `shared-key` so the qualification
    # scripts' `tauri dev` invocation finds a populated target dir. `needs:`
    # enforces the cache-write/read ordering.
    needs: tauri-foundation
    env:
      # Persist the qualification evidence inside the workspace so the
      # upload-artifact step can grab it (the default temp-dir behavior
      # leaves it on the runner).
      SSE_TAURI_QUALIFICATION_EVIDENCE_DIR: ${{ github.workspace }}/artifacts/qualification
      # 3 min per waitForStatus phase. The qualification scripts default to
      # 40s; that worked on the operator laptop but not on ubuntu-latest.
      SSE_TAURI_QUALIFICATION_TIMEOUT_MS: "180000"
      # Force Mesa software rendering so the WebKitGTK shell does not try
      # (and fail) to probe a DRI3 device under xvfb. Without this, the
      # engine's first health snapshot is delayed by the libEGL fallback.
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-tauri-linux
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
          # Share `tauri-foundation`'s populated cache (see `needs:`
          # comment above).
          shared-key: tauri-foundation
      - run: npm ci
      - name: Pre-build the Tauri shell binary
        # `tauri dev` would otherwise cold-compile the shell crate inside
        # the qualification script's waitForStatus window. Pre-building
        # means `tauri dev` finds an up-to-date binary and reaches
        # "initial ready state" well inside the timeout. The `--features
        # test-bridge` flag mirrors what
        # `frontend/app/package.json:tauri:dev` invokes.
        working-directory: native/tauri-shell
        run: cargo build --features test-bridge
      - name: Tauri Setup/Support qualification
        run: xvfb-run -a npm run tauri:setup-support:qualify
      - name: Tauri workspace qualification
        run: xvfb-run -a npm run tauri:workspaces:qualify
      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-qualification-evidence
          path: ${{ github.workspace }}/artifacts/qualification/
          if-no-files-found: ignore
          retention-days: 14
