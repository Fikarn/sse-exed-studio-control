name: dev-checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Required merge hygiene on protected branches. Never a release gate.
# Target-host release evidence on macOS Apple Silicon and Windows 11 x64
# remains the release acceptance mechanism for this repo (see AGENTS.md).
jobs:
  format-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run protocol:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run frontend:typecheck

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native -> target
      - run: npm ci
      - run: npm run rust:fmt:check
      - run: npm run rust:clippy
      - run: npm run native:check
      - run: npm run native:test
