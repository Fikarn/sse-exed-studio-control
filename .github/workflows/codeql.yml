name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    # Private repositories require GitHub Advanced Security for CodeQL upload.
    # Set CODEQL_PRIVATE_ENABLED=true after enabling that repo feature.
    if: ${{ github.event.repository.private == false || vars.CODEQL_PRIVATE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: github/codeql-action/analyze@v4
