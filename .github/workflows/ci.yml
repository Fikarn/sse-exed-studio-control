name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Format check
        run: npm run format:check

      - name: Release metadata check
        run: npm run release:check

  frontend-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate protocol artifacts
        run: npm run protocol:generate

      - name: Frontend foundation
        run: npm run frontend:foundation

      - name: Upload frontend foundation artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-foundation
          path: |
            frontend/**/storybook-static/
            frontend/**/playwright-report/
            frontend/**/test-results/
            native/protocol/generated/
          retention-days: 7
          if-no-files-found: warn

  native-foundation:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt and QtIFW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: mac
          target: desktop
          tools: "tools_ifw"

      - name: Native cargo check
        run: npm run native:check

      - name: Native cargo test
        run: npm run native:test

      - name: Native build
        run: npm run native:build

      - name: Native shell QML tests
        run: npm run native:shell:test

      - name: Upload native shell QML test output (macOS)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-shell-qmltest-macos
          path: |
            native/build/qt-shell/qmltest-results.tap
            native/build/qt-shell/qmltest-results.xml
            native/build/Testing/Temporary/
          retention-days: 14
          if-no-files-found: warn

      - name: Native smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke
        run: npm run native:smoke

      - name: Native clean-start smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-clean
        run: npm run native:smoke:clean-start

      - name: Native bundled-engine smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-bundled
        run: npm run native:smoke:bundled-engine

      - name: Native packaged macOS smoke test
        run: npm run native:package:mac:smoke

      - name: Native packaged macOS clean-start smoke test
        run: npm run native:package:mac:clean-smoke

      - name: Native packaged macOS acceptance test
        env:
          SSE_NATIVE_PACKAGED_ACCEPTANCE_DIR: ${{ github.workspace }}/native-packaged-acceptance-macos
        run: npm run native:package:mac:acceptance

      - name: Verify native macOS control-surface bridge qualification
        env:
          SSE_NATIVE_BRIDGE_ACCEPTANCE_DIR: ${{ github.workspace }}/native-bridge-acceptance-macos
        run: npm run native:bridge:mac:verify

      - name: Native macOS installer build
        run: npm run native:installer:mac:local

      - name: Native macOS update repository build
        run: npm run native:update-repo:mac:local

      - name: Write native macOS checksum manifest
        run: npm run native:checksums:mac:write

      - name: Verify native macOS release artifacts
        run: npm run native:artifacts:mac:verify

      - name: Verify native macOS release continuity
        run: npm run native:continuity:mac:verify

      - name: Verify native macOS staged delivery acceptance
        env:
          SSE_NATIVE_DELIVERY_ACCEPTANCE_DIR: ${{ github.workspace }}/native-delivery-acceptance-macos
        run: npm run native:delivery:mac:verify

      - name: Verify native macOS real installer acceptance
        env:
          SSE_NATIVE_INSTALLER_ACCEPTANCE_DIR: ${{ github.workspace }}/native-installer-acceptance-macos
        run: npm run native:installer-acceptance:mac:verify

      - name: Native lifecycle smoke tests
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-lifecycle
        run: npm run native:smoke:lifecycle

      - name: Native failure smoke tests
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-failures
        run: npm run native:smoke:failures

      - name: Native acceptance test
        env:
          SSE_NATIVE_ACCEPTANCE_DIR: ${{ github.workspace }}/native-acceptance
        run: npm run native:acceptance

      - name: Upload native smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke
          path: native-smoke/
          retention-days: 7

      - name: Upload native bundled smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-bundled
          path: native-smoke-bundled/
          retention-days: 7

      - name: Upload native clean-start smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-clean
          path: native-smoke-clean/
          retention-days: 7

      - name: Upload native macOS package artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-package-macos
          path: |
            release/native/macos/
            release/native-installer/macos/
            release/native-updates/macos/
            release/checksums/macos/
            native-packaged-acceptance-macos/
            native-bridge-acceptance-macos/
            native-delivery-acceptance-macos/
            native-installer-acceptance-macos/
            native/build/Testing/Temporary/
          retention-days: 7

      - name: Upload native lifecycle smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-lifecycle
          path: native-smoke-lifecycle/
          retention-days: 7

      - name: Upload native failure smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-failures
          path: native-smoke-failures/
          retention-days: 7

      - name: Upload native acceptance artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-acceptance
          path: native-acceptance/
          retention-days: 7

  tauri-foundation-macos:
    runs-on: macos-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Tauri foundation
        run: npm run tauri:foundation

      - name: Upload Tauri macOS artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tauri-foundation-macos
          path: |
            native/tauri-shell/target/
            frontend/**/playwright-report/
            frontend/**/test-results/
            native/protocol/generated/
          retention-days: 7
          if-no-files-found: warn

  native-foundation-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Qt and QtIFW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          tools: "tools_ifw"

      - name: Native cargo check
        run: npm run native:check

      - name: Native cargo test
        run: npm run native:test

      - name: Native build
        run: npm run native:build

      - name: Native shell QML tests
        run: npm run native:shell:test

      - name: Upload native shell QML test output (Windows)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: native-shell-qmltest-windows
          path: |
            native/build/qt-shell/qmltest-results.tap
            native/build/qt-shell/qmltest-results.xml
            native/build/Testing/Temporary/
          retention-days: 14
          if-no-files-found: warn

      - name: Native smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-windows
        run: npm run native:smoke

      - name: Native clean-start smoke test
        env:
          SSE_NATIVE_SMOKE_DIR: ${{ github.workspace }}/native-smoke-windows-clean
        run: npm run native:smoke:clean-start

      - name: Native packaged Windows smoke test
        run: npm run native:package:win:smoke

      - name: Native packaged Windows clean-start smoke test
        run: npm run native:package:win:clean-smoke

      - name: Native packaged Windows acceptance test
        env:
          SSE_NATIVE_PACKAGED_ACCEPTANCE_DIR: ${{ github.workspace }}/native-packaged-acceptance-windows
        run: npm run native:package:win:acceptance

      - name: Verify native Windows control-surface bridge qualification
        env:
          SSE_NATIVE_BRIDGE_ACCEPTANCE_DIR: ${{ github.workspace }}/native-bridge-acceptance-windows
        run: npm run native:bridge:win:verify

      - name: Native Windows installer build
        run: npm run native:installer:win:local

      - name: Native Windows update repository build
        run: npm run native:update-repo:win:local

      - name: Write native Windows checksum manifest
        run: npm run native:checksums:win:write

      - name: Verify native Windows release artifacts
        run: npm run native:artifacts:win:verify

      - name: Verify native Windows release continuity
        run: npm run native:continuity:win:verify

      - name: Verify native Windows staged delivery acceptance
        env:
          SSE_NATIVE_DELIVERY_ACCEPTANCE_DIR: ${{ github.workspace }}/native-delivery-acceptance-windows
        run: npm run native:delivery:win:verify

      - name: Verify native Windows real installer acceptance
        env:
          SSE_NATIVE_INSTALLER_ACCEPTANCE_DIR: ${{ github.workspace }}/native-installer-acceptance-windows
        run: npm run native:installer-acceptance:win:verify

      - name: Upload native Windows smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-windows
          path: native-smoke-windows/
          retention-days: 7

      - name: Upload native Windows clean-start smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-smoke-windows-clean
          path: native-smoke-windows-clean/
          retention-days: 7

      - name: Upload native Windows package artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-package-windows
          path: |
            release/native/windows/
            release/native-installer/windows/
            release/native-updates/windows/
            release/checksums/windows/
            native-packaged-acceptance-windows/
            native-bridge-acceptance-windows/
            native-delivery-acceptance-windows/
            native-installer-acceptance-windows/
            native/build/
            native/build/Testing/Temporary/
          retention-days: 7

  tauri-foundation-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Tauri foundation
        run: npm run tauri:foundation

      - name: Upload Tauri Windows artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tauri-foundation-windows
          path: |
            native/tauri-shell/target/
            frontend/**/playwright-report/
            frontend/**/test-results/
            native/protocol/generated/
          retention-days: 7
          if-no-files-found: warn
