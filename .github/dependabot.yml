version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 2
    rebase-strategy: disabled
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: npm
    directory: "/"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 2
    rebase-strategy: disabled
    allow:
      - dependency-type: direct
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "chore(deps)"
    groups:
      tooling:
        update-types:
          - minor
          - patch
        patterns:
          - "husky"
          - "lint-staged"
          - "prettier"
          - "eslint"
          - "@typescript-eslint/*"
          - "eslint-plugin-*"
          - "typescript-eslint"

  - package-ecosystem: npm
    directory: "/frontend/app"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 2
    rebase-strategy: disabled
    allow:
      - dependency-type: direct
    commit-message:
      prefix: "chore(frontend-deps)"

  # Single cargo entry covers the whole native/ workspace (introduced in
  # `bb777ed`). Update-types for the runtime, protocol, and shell crates
  # all flow through here; the patterns below group related dependencies
  # so they ship as one PR rather than three.
  - package-ecosystem: cargo
    directory: "/native"
    target-branch: "main"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 2
    rebase-strategy: disabled
    commit-message:
      prefix: "chore(native-deps)"
    groups:
      native-runtime:
        update-types:
          - minor
          - patch
        patterns:
          - "rusqlite"
          - "serde"
          - "serde_json"
      native-shell:
        update-types:
          - minor
          - patch
        patterns:
          - "tauri"
          - "tauri-build"
      native-tooling:
        update-types:
          - minor
          - patch
        patterns:
          - "ts-rs"
          - "ts-rs-macros"
